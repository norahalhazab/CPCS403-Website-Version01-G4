<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Schedule • Red Sea Escapes</title>
  <link rel="stylesheet" href="../global/main.css"/>
  <style>
    .table-container{
      width:100%;
      overflow-x:auto;
      background:white;
      border-radius:22px;
      box-shadow:0 14px 36px rgba(2,6,23,.08);
      border:1px solid rgba(15,23,42,.12);
    }
    table{width:100%;border-collapse:collapse;min-width:900px}
    th{background:#f8fafc;color:#64748b;text-align:left;padding:16px;font-weight:800;border-bottom:1px solid #e2e8f0}
    td{padding:16px;border-bottom:1px solid #e2e8f0;vertical-align:middle}
    tr:hover{background:#f8fafc}
    .table-img{width:60px;height:60px;border-radius:14px;object-fit:cover;margin-right:12px}
    .activity-cell{display:flex;align-items:center;font-weight:800;color:#1e293b}
    .status-badge{font-weight:800;font-size:.78rem;padding:7px 10px;border-radius:999px;border:1px solid}
    .expired{opacity:.55}
    .available{color:#166534;border-color:#86efac;background:#dcfce7}
    .limited{color:#92400e;border-color:#fcd34d;background:#fef3c7}
    .full{color:#991b1b;border-color:#fecaca;background:#fee2e2}
  </style>
</head>

<body>

<div class="navWrap">
  <div class="container">
    <nav class="nav">
      <a class="brand" href="../index.html"><span class="dot"></span><span>Red Sea Escapes</span></a>
      <div class="navLinks">
        <a href="../index.html">Home</a>
        <a href="./about.html">About</a>
        <a href="./services.html">Services</a>
        <a class="active" href="./schedule.html">Schedule</a>
        <a href="./feedback.html">Feedback</a>
        <a href="../profile.php">Profile</a>
      </div>
    </nav>
  </div>
</div>

<header class="hero heroSimple">
  <div class="hero__bg" style="background-image:url('../images/Dunes/The_Oasis.webp')"></div>
  <div class="hero__overlay"></div>
  <div class="hero__content">
    <div class="container hero__inner center">
      <h1 class="h1">Explore Activities</h1>
      <p class="hero__sub">Check real-time availability before booking.</p>
    </div>
  </div>
</header>

<main class="section">
  <div class="container">

    <div class="panel" style="margin-bottom:40px;">
      <div class="formgrid" style="grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:15px;">
        <label>
          Date
          <input type="date" id="dateFilter">
        </label>

        <label>
          Category
          <select id="typeFilter">
            <option value="all">All Types</option>
            <option value="water">Water</option>
            <option value="desert">Desert</option>
          </select>
        </label>

        <label>
          Activity Name
          <select id="activityFilter">
            <option value="all">All Activities</option>
            <option value="dive">Dive</option>
            <option value="snorkeling">Snorkeling</option>
            <option value="sailing">Sailing</option>
            <option value="kayaking">Kayaking</option>
            <option value="hiking">Hiking</option>
            <option value="ebiking">E-Biking</option>
          </select>
        </label>
      </div>
    </div>

    <div class="table-container">
      <table>
        <thead>
          <tr>
            <th>Activity</th>
            <th>Category</th>
            <th>Age</th>
            <th>Time</th>
            <th>Availability</th>
            <th>Slots Left</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="scheduleBody"></tbody>
      </table>

      <div id="noResults" class="panel center" style="display:none;border:none;">
        No activities match these filters.
      </div>
    </div>

  </div>
</main>

<footer class="footer">
  <div class="container">
    <div class="row">
      <div>
        <b>Red Sea Escapes</b>
        <div class="mini">© 2026</div>
      </div>
      <div class="links">
        <a href="./services.html">Services</a>
        <a href="./feedback.html">Feedback</a>
        <a href="../index.html">Home</a>
      </div>
    </div>
  </div>
</footer>

<script>
const tableBody = document.getElementById("scheduleBody");
const noResults = document.getElementById("noResults");

const dateFilter = document.getElementById("dateFilter");
const typeFilter = document.getElementById("typeFilter");
const activityFilter = document.getElementById("activityFilter");

dateFilter.value = new Date().toISOString().split("T")[0];

function statusClass(status){
  if(status === "Full") return "full";
  if(status === "Limited") return "limited";
  return "available";
}

function activityKey(name){
  return name.toLowerCase().replace("-", "").replace(/\s+/g, "");
}

function loadSchedule(){
  const date = dateFilter.value;
  const type = typeFilter.value;
  const activity = activityFilter.value;

  tableBody.innerHTML = `
    <tr>
      <td colspan="7" style="text-align:center;padding:24px;">Loading schedule...</td>
    </tr>
  `;

  fetch(`../server/get_schedule.php?date=${date}&type=${type}&activity=${activity}`)
    .then(res => res.json())
    .then(data => {
      tableBody.innerHTML = "";

      if(!data.length){
        noResults.style.display = "block";
        return;
      }

      noResults.style.display = "none";

      data.forEach(item => {
        const row = document.createElement("tr");

        const key = activityKey(item.activity_name);
        const bookingUrl = `./activities_booking.html?activity=${key}&date=${date}`;

        row.innerHTML = `
          <td>
            <div class="activity-cell">
              <img src="../${item.image_path}" class="table-img" onerror="this.src='../images/hero.jpg'">
              ${item.activity_name}
            </div>
          </td>
          <td><span class="mini">${item.category.toUpperCase()}</span></td>
          <td>${item.min_age}+</td>
          <td><b>${item.slot_time}</b><br><small>${date}</small></td>
          <td>
            <span class="status-badge ${statusClass(item.status)}">
              ${item.status}
            </span>
          </td>
          <td>
            <b>${item.remaining}</b> / ${item.max_people}
            <br><small>${item.booked_people} booked</small>
          </td>
          <td>
            <a class="btn ${item.disabled ? '' : 'brand'}"
               style="padding:8px 16px;font-size:.8rem;pointer-events:${item.disabled ? 'none' : 'auto'};opacity:${item.disabled ? '.5' : '1'}"
               href="${bookingUrl}">
               ${item.disabled ? 'Full' : 'Book'}
            </a>
          </td>
        `;

        tableBody.appendChild(row);
      });
    })
    .catch(() => {
      tableBody.innerHTML = `
        <tr>
          <td colspan="7" style="text-align:center;color:#991b1b;padding:24px;">
            Could not load schedule from database.
          </td>
        </tr>
      `;
    });
}

dateFilter.addEventListener("change", loadSchedule);
typeFilter.addEventListener("change", loadSchedule);
activityFilter.addEventListener("change", loadSchedule);

loadSchedule();
</script>

</body>
</html>
