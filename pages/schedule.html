Description:

It lets users filter excursions by date or category,
check real time availability (Available, Limited, or Full), and book directly.

<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Schedule • Red Sea Escapes</title>
  <link rel="stylesheet" href="../global/main.css"/>
  <style>
    .table-container { 
      width: 100%; 
      overflow-x: auto; 
      background: white; 
      border-radius: 12px; 
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); 
    }
    table { width: 100%; border-collapse: collapse; min-width: 800px; }
    th { background-color: #f8fafc; color: #64748b; text-align: left; padding: 16px; font-weight: 600; border-bottom: 2px solid #e2e8f0; }
    td { padding: 16px; border-bottom: 1px solid #e2e8f0; vertical-align: middle; }
    tr:hover { background-color: #f1f5f9; cursor: pointer; }
    .table-img { width: 60px; height: 60px; border-radius: 8px; object-fit: cover; margin-right: 12px; }
    .activity-cell { display: flex; align-items: center; font-weight: 600; color: #1e293b; }
    .status-badge { font-weight: 700; text-transform: uppercase; font-size: 0.75rem; padding: 4px 8px; border-radius: 4px; border: 1px solid; }
    .expired { opacity: 0.5; }
  </style>
</head>

<body>

  <div class="navWrap">
    <div class="container">
      <nav class="nav">
        <a class="brand" href="../index.html"><span class="dot"></span><span>Red Sea Escapes</span></a>
        <div class="navLinks">
          <a href="../index.html">Home</a>
          <a href="./about.html">About</a>
          <a href="./services.html">Services</a>
          <a class="active" href="./schedule.html">Schedule</a>
          <a href="./feedback.html">Feedback</a>
        </div>
        <div class="navRight">
          <button class="accountBtn" id="accountBtn" type="button">Account</button>
        </div>
      </nav>
    </div>
  </div>

  <header class="hero heroSimple">
    <div class="hero__bg" style="background-image:url('../images/Dunes/The_Oasis.webp')"></div>
    <div class="hero__overlay"></div>
    <div class="hero__content">
      <div class="container hero__inner center">
        <h1 class="h1">Explore Activities</h1>
        <p class="hero__sub">From the depths of the ocean to the heart of the desert</p>
      </div>
    </div>
  </header>

  <main class="section">
    <div class="container">

      <div class="panel" style="margin-bottom: 40px;">
        <div class="formgrid" style="grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px;"> 
          <label> Date <input type="date" id="dateFilter"/> </label>
          <label> Category 
            <select id="typeFilter">
              <option value="all">All Types</option>
              <option value="water">Water</option>
              <option value="desert">Desert</option>
            </select>
          </label>
          <label> Activity Name 
            <select id="activityFilter">
              <option value="all">All Activities</option>
              <option value="dive">Dive</option>
              <option value="snorkeling">Snorkeling</option>
              <option value="sailing">Sailing</option>
              <option value="kayaking">Kayaking</option>
              <option value="hiking">Hiking</option>
              <option value="ebiking">E-Biking</option>
            </select> 
          </label>
        </div>
      </div>

      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th>Activity</th>
              <th>Category</th>
              <th>Age</th>
              <th>Time Slot</th>
              <th>Status</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="scheduleBody"></tbody>
        </table>
        <div id="noResults" class="panel center" style="display:none; border:none;">No activities match these filters</div>
      </div>

    </div>
  </main>

  <footer class="footer">
    <div class="container">
      <div class="row">
        <div>
          <b>Red Sea Escapes</b>
          <div class="mini">© 2026</div>
        </div>
        <div class="links">
          <a href="./services.html">Services</a>
          <a href="./feedback.html">Feedback</a>
          <a href="../index.html">Home</a>
        </div>
      </div>
    </div>
  </footer>

  <script>
    (function() {
      const activities = [
        { id: "dive", name: "Dive", type: "water", age: "12+", baseTime: "09:00", img: "../images/Activites/Dive.webp" },
        { id: "snorkeling", name: "Snorkeling", type: "water", age: "8+", baseTime: "11:00", img: "../images/Activites/Snorkeling.webp" },
        { id: "sailing", name: "Sailing", type: "water", age: "10+", baseTime: "13:00", img: "../images/Activites/Sailing.webp" },
        { id: "kayaking", name: "Kayaking", type: "water", age: "10+", baseTime: "15:00", img: "../images/Activites/Kayaking.webp" },
        { id: "hiking", name: "Hiking", type: "desert", age: "12+", baseTime: "07:00", img: "../images/Activites/Hiking.webp" },
        { id: "ebiking", name: "E-Biking", type: "desert", age: "16+", baseTime: "16:00", img: "../images/Activites/E-Biking.webp" }
      ];

      const tableBody = document.getElementById("scheduleBody");
      const noResults = document.getElementById("noResults");
      const filters = ['dateFilter', 'typeFilter', 'activityFilter'].map(id => document.getElementById(id));

      function getStatus(name, date) {
        const today = new Date().toISOString().split("T")[0];
        if (date < today) return { label: "Expired", color: "#64748b", disabled: true };
        
        const hash = name.length + parseInt(date.split('-').join(''));
        const mod = hash % 3;
        
        if (mod === 0) return { label: "Full", color: "#ef4444", disabled: true };
        if (mod === 1) return { label: "Limited", color: "#f59e0b", disabled: false };
        return { label: "Available", color: "#10b981", disabled: false };
      }

      function render() {
        const [dF, tF, aF] = filters.map(f => f.value);
        tableBody.innerHTML = "";
        let count = 0;

        activities.forEach(item => {
          if (tF !== "all" && item.type !== tF) return;
          if (aF !== "all" && item.id !== aF) return;

          const status = getStatus(item.name, dF);
          const bookingUrl = `./activities_booking.html?activity=${item.id}&date=${dF}`;

          const row = document.createElement("tr");
          if (status.disabled) row.classList.add("expired");
          
          row.onclick = () => { if(!status.disabled) window.location.href = bookingUrl; };

          row.innerHTML = `
            <td>
              <div class="activity-cell">
                <img src="${item.img}" class="table-img" onerror="this.src='../images/hero.jpg'">
                ${item.name}
              </div>
            </td>
            <td><span class="mini">${item.type.toUpperCase()}</span></td>
            <td>${item.age}</td>
            <td><b>${item.baseTime}</b><br><small>${dF}</small></td>
            <td><span class="status-badge" style="color:${status.color}; border-color:${status.color}">${status.label}</span></td>
            <td>
              <button class="btn ${status.disabled ? '' : 'brand'}" style="padding: 8px 16px; font-size: 0.8rem" ${status.disabled ? 'disabled' : ''}>
                ${status.disabled ? 'N/A' : 'Book'}
              </button>
            </td>
          `;
          tableBody.appendChild(row);
          count++;
        });

        noResults.style.display = count === 0 ? "block" : "none";
      }

      filters[0].value = new Date().toISOString().split("T")[0];
      filters.forEach(el => el.addEventListener("change", render));
      render();
    })();
  </script>
</body>
</html>
